name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: ./test/e2e/run.sh

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: ./scripts/build-release.sh
        env:
          VERSION: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: plex-proxy-pr-${{ github.event.pull_request.number }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 7
