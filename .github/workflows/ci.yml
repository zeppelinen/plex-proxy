name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - name: Run unit tests
        run: ./scripts/run-unit-tests.sh
      - name: Publish unit test report
        if: always() && hashFiles('test-results/unit.json') != ''
        uses: dorny/test-reporter@v3
        with:
          name: Unit tests
          path: test-results/unit.json
          reporter: golang-json
          fail-on-error: false
      - name: Check coverage does not decrease
        run: ./scripts/check-coverage.sh
        env:
          BASE_REF: ${{ github.base_ref }}
      - name: Post coverage PR comment
        if: always() && github.event_name == 'pull_request' && hashFiles('test-results/coverage.md') != ''
        run: |
          body="$(cat test-results/coverage.md)"
          comment_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
              --jq '.[] | select(.body | contains("<!-- plex-proxy-coverage-report -->")) | .id' |
              head -n 1
          )"
          if [ -n "$comment_id" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" \
              -X PATCH \
              -f body="$body" >/dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${{ github.event.pull_request.number }}/comments" \
              -X POST \
              -f body="$body" >/dev/null
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      - run: go test -race ./...
      - name: Run e2e tests
        run: ./test/e2e/run.sh
      - name: Publish e2e test report
        if: always() && hashFiles('test-results/e2e.xml') != ''
        uses: dorny/test-reporter@v3
        with:
          name: E2E tests
          path: test-results/e2e.xml
          reporter: java-junit
          fail-on-error: false
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: ./scripts/build-release.sh
        env:
          VERSION: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: plex-proxy-pr-${{ github.event.pull_request.number }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 7
