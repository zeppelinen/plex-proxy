name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - name: Run unit tests
        run: ./scripts/run-unit-tests.sh
      - name: Publish unit test report
        if: always() && hashFiles('test-results/unit.json') != ''
        uses: dorny/test-reporter@v3
        with:
          name: Unit tests
          path: test-results/unit.json
          reporter: golang-json
          fail-on-error: false
      - name: Check coverage does not decrease
        run: ./scripts/check-coverage.sh
        env:
          BASE_REF: ${{ github.base_ref }}
      - run: go test -race ./...
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: ./scripts/build-release.sh
        env:
          VERSION: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: plex-proxy-pr-${{ github.event.pull_request.number }}
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 7
